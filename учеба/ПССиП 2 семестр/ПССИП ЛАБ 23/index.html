<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа №22</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Задание 1 -->
    <section class="task">
        <h2>Задание 1: Счетчик кликов</h2>
        <button id="task1-btn">Увеличить значение</button>
        <p>Счетчик: <span id="task1-span">0</span></p>
    </section>

    <!-- Задание 2 -->
    <section class="task">
        <h2>Задание 2: Изменение цвета при наведении</h2>
        <div id="task2-div" class="hover-box">Наведи на меня курсор мыши</div>
    </section>

    <!-- Задание 3 -->
    <section class="task">
        <h2>Задание 3: Отслеживание ввода</h2>
        <input type="text" id="task3-input" placeholder="Пиши сюда...">
        <p>Вы ввели: <span id="task3-output"></span></p>
    </section>

    <!-- Задание 4 -->
    <section class="task">
        <h2>Задание 4: Скрытие и показ элемента</h2>
        <button id="task4-btn">Показать / Скрыть блок</button>
        <div id="task4-div" style="display: none;" class="secret-box">
            Секретный текст, который появляется и исчезает!
        </div>
    </section>

    <!-- Задание 5 -->
    <section class="task">
        <h2>Задание 5: Валидация формы</h2>
        <form id="task5-form">
            <input type="text" id="task5-email" placeholder="Введите email">
            <button type="submit">Отправить</button>
            <span id="task5-error" class="error-msg"></span>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
