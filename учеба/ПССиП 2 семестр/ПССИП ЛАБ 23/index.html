<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа №23</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="task">
        <h2>Задание 1: Плавное появление (Opacity)</h2>
        <button id="task1-btn">Показать элемент</button>
        <div id="task1-box" class="box" style="opacity: 0;">Я появляюсь!</div>
    </section>

    <section class="task">
        <h2>Задание 2: Циклическое изменение цвета</h2>
        <button id="task2-btn">Старт / Стоп смена цвета</button>
        <div id="task2-box" class="box color-transition">Смена цвета</div>
    </section>

    <section class="task">
        <h2>Задание 3: Горизонтальное перемещение</h2>
        <label for="speed-input">Скорость (пикс/кадр): </label>
        <input type="number" id="speed-input" value="3" min="1" max="20" style="width: 60px; margin-bottom: 10px;">
        <br>
        <button id="task3-btn">Поехать вправо</button>
        <div class="track">
            <div id="task3-box" class="box">Вжух!</div>
        </div>
    </section>

    <section class="task">
        <h2>Задание 4: Масштаб и Прозрачность</h2>
        <button id="task4-btn">Анимировать</button>
        <div id="task4-box" class="box transition-all">Увеличиваюсь и исчезаю</div>
    </section>

    <section class="task">
        <h2>Задание 5: Последовательность анимаций</h2>
        <button id="task5-btn">Запустить цепочку</button>
        <div class="track">
            <div id="task5-box" class="box transition-all">Цепочка</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
