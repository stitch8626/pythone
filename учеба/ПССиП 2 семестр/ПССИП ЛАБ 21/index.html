<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа: DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Лабораторная работа (DOM и События)</h1>

        <!-- Задание 1 -->
        <section class="task">
            <h2>Задание 1: Изменение кнопки</h2>
            <button id="myButton" class="btn">Нажми меня</button>
        </section>

        <!-- Задание 2 -->
        <section class="task">
            <h2>Задание 2: Добавление в список</h2>
            <ul id="myList">
                <li>Первый элемент</li>
                <li>Второй элемент</li>
            </ul>
            <div class="input-group">
                <input type="text" id="newItemText" placeholder="Введите новый элемент">
                <button id="addItemBtn" class="btn">Добавить</button>
            </div>
        </section>

        <!-- Задание 3 -->
        <section class="task">
            <h2>Задание 3: Удаление из списка</h2>
            <ul id="removableList">
                <li class="removable-item">Элемент 1 <span class="remove-btn">[x]</span></li>
                <li class="removable-item">Элемент 2 <span class="remove-btn">[x]</span></li>
                <li class="removable-item">Элемент 3 <span class="remove-btn">[x]</span></li>
            </ul>
        </section>

       <!-- Задание 4 -->
       <section class="task">
        <h2>Задание 4: Смена изображения при наведении</h2>
        <img 
            id="myImage"
            src="image1.jpg" 
            alt="Изображение 1" 
            data-alt-src="image2.jpg"
        />
    </section>
       

        <!-- Задание 5 -->
        <section class="task">
            <h2>Задание 5: Динамическая таблица</h2>
            <div id="tableContainer"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
