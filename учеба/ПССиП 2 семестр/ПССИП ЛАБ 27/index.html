<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа: Canvas</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <h1>Лабораторная работа: HTML5 Canvas</h1>
    
    <div class="task-container">
        <div class="task">
            <h2>Задание 1: Геометрические фигуры</h2>
            <canvas id="task1" width="300" height="300"></canvas>
        </div>

        <div class="task">
            <h2>Задание 2: Линии и узоры</h2>
            <canvas id="task2" width="300" height="300"></canvas>
        </div>

        <div class="task">
            <h2>Задание 3: Градиенты</h2>
            <canvas id="task3" width="300" height="300"></canvas>
        </div>

        <div class="task">
            <h2>Задание 4: Сердце с тенью</h2>
            <canvas id="task4" width="300" height="300"></canvas>
        </div>

        <div class="task wide">
            <h2>Задание 5: Интерактивное рисование</h2>
            <div class="controls">
                <label>Цвет кисти: <input type="color" id="brushColor" value="#ef4444"></label>
                <label>Размер: <input type="range" id="brushSize" min="1" max="25" value="8"></label>
                <button id="clearBtn">Очистить холст</button>
            </div>
            <canvas id="task5" width="640" height="320"></canvas>
        </div>
    </div>

</body>
</html>
